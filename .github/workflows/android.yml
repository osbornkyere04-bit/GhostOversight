name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      # Step 1: Load the code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Set up Python 3.10 perfectly
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Step 3: Set up exact Java 17 environment
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Step 4: Install the remaining Linux tools
      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev

      # Step 5: Install Buildozer
      - name: Install Buildozer & Cython
        run: |
          pip install --upgrade pip
          pip install --upgrade "Cython<3.0" buildozer

      # Step 6: Start the factory (auto-answers yes to prompts)
      - name: Build the APK
        run: |
          yes | buildozer -v android debug

      # Step 7: Export the APK
      - name: Upload the final APK
        uses: actions/upload-artifact@v4
        with:
          name: GhostOversight-APK
          path: bin/*.apk
