name: Build Android APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git \
            zip \
            unzip \
            python3-pip \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo5 \
            cmake \
            libffi-dev \
            libssl-dev \
            build-essential

      - name: Upgrade pip and Install Python Dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install --upgrade "Cython<3.0" buildozer

      - name: Verify Java Installation
        run: |
          java -version
          javac -version

      - name: Build APK with Buildozer
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
        run: |
          yes | buildozer -v android debug

      - name: Check APK Output
        run: |
          ls -lh bin/ || echo "bin directory not found"
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK files found"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: GhostOversight-APK
          path: bin/*.apk
          retention-days: 30

      - name: Upload Build Logs on Failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: Build-Logs
          path: |
            .buildozer/android/platform/build-*/build.log
            .buildozer/android/platform/build-*/build-*/build.log
          retention-days: 7
